<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pembayaran TokoKasir</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  color:#172033;
}
.wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
}
.card{
  width:100%;
  max-width:620px;
  background:#fff;
  border:1px solid #e2e8f0;
  border-radius:24px;
  padding:32px;
  box-shadow:0 20px 60px rgba(20,40,80,.08);
}
.logo{
  display:inline-flex;
  width:52px;
  height:52px;
  border-radius:15px;
  align-items:center;
  justify-content:center;
  background:#0f62fe;
  color:#fff;
  font-weight:900;
}
h1{margin:20px 0 8px}
.subtitle{color:#64748b;line-height:1.6}
.summary{
  margin:25px 0;
  padding:20px;
  border-radius:16px;
  background:#f8fafc;
  border:1px solid #e5eaf1;
}
.row{
  display:flex;
  justify-content:space-between;
  gap:20px;
  padding:10px 0;
}
.total{
  border-top:1px solid #dde4ec;
  margin-top:8px;
  padding-top:18px;
  font-size:20px;
}
.bank{
  padding:20px;
  border-radius:16px;
  background:#eef5ff;
  margin:20px 0;
}
.bank strong{
  display:block;
  font-size:22px;
  margin:8px 0;
}
.status{
  padding:15px;
  border-radius:12px;
  margin:20px 0;
  font-weight:700;
}
.pending{
  background:#fff7df;
  color:#8a6500;
}
.approved{
  background:#eafbf1;
  color:#167044;
}
.error{
  background:#fff0f0;
  color:#b42318;
}
.actions{
  display:grid;
  gap:10px;
}
button,a{
  font:inherit;
}
.btn{
  display:block;
  width:100%;
  border:0;
  border-radius:11px;
  padding:14px;
  font-weight:800;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
}
.primary{
  background:#0f62fe;
  color:white;
}
.secondary{
  background:#eef2f7;
  color:#172033;
}
small.note{
  display:block;
  margin-top:20px;
  color:#64748b;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="card">

<div class="logo">TK</div>

<h1>Pembayaran TokoKasir</h1>

<p class="subtitle">
Selesaikan pembayaran paket Anda. Setelah pembayaran
diverifikasi oleh admin, paket akan aktif selama 30 hari.
</p>

<div id="content">
  <p>Memuat tagihan...</p>
</div>

</div>
</div>

<script>
const API = "http://localhost:3000";

const token =
  localStorage.getItem("tokokasir_token");

const params =
  new URLSearchParams(window.location.search);

const paymentId =
  params.get("payment_id");

const content =
  document.getElementById("content");

if (!token) {
  window.location.replace("../account/");
}

if (!paymentId) {
  content.innerHTML = `
    <div class="status error">
      ID pembayaran tidak ditemukan.
    </div>

    <a class="btn secondary" href="../account/">
      Kembali ke Akun
    </a>
  `;
} else {
  loadPayment();
}

async function api(path, options = {}) {
  options.headers = {
    ...(options.headers || {}),
    Authorization: "Bearer " + token
  };

  const response =
    await fetch(API + path, options);

  const data =
    await response.json();

  if (!response.ok) {
    throw new Error(
      data.message ||
      "Terjadi kesalahan."
    );
  }

  return data;
}

async function loadPayment() {
  try {
    const data =
      await api("/api/payments/my");

    const payment =
      data.payments.find(
        item =>
          String(item.id) ===
          String(paymentId)
      );

    if (!payment) {
      throw new Error(
        "Tagihan tidak ditemukan."
      );
    }

    renderPayment(payment);

  } catch (error) {
    content.innerHTML = `
      <div class="status error">
        ${escapeHtml(error.message)}
      </div>

      <a class="btn secondary" href="../account/">
        Kembali ke Akun
      </a>
    `;
  }
}

function renderPayment(payment) {
  const planLabel =
    payment.plan === "business"
      ? "Business"
      : "Pro";

  const amount =
    Number(payment.amount)
      .toLocaleString("id-ID");

  const isApproved =
    payment.status === "approved";

  content.innerHTML = `
    <div class="summary">

      <div class="row">
        <span>ID Pembayaran</span>
        <strong>#${payment.id}</strong>
      </div>

      <div class="row">
        <span>Paket</span>
        <strong>${planLabel}</strong>
      </div>

      <div class="row total">
        <span>Total</span>
        <strong>Rp${amount}</strong>
      </div>

    </div>

    ${
      isApproved
      ? `
        <div class="status approved">
          ✓ Pembayaran telah diverifikasi.
          Paket ${planLabel} sudah aktif.
        </div>

        <div class="actions">
          <a class="btn primary" href="../app/">
            Buka TokoKasir
          </a>

          <a class="btn secondary" href="../account/">
            Lihat Akun
          </a>
        </div>
      `
      : `
        <div class="bank">
          Transfer sesuai total tagihan ke:

          <strong>Bank Mandiri</strong>

          <div class="row">
            <span>Nomor Rekening</span>
            <b>1670003828281</b>
          </div>

          <div class="row">
            <span>Nama Rekening</span>
            <b>Alma</b>
          </div>
        </div>

        <div class="status pending">
          ⏳ Menunggu verifikasi pembayaran
        </div>

        <div class="actions">
          <button
            class="btn primary"
            onclick="checkStatus()"
          >
            Cek Status Pembayaran
          </button>

          <a
            class="btn secondary"
            href="../account/"
          >
            Kembali ke Akun
          </a>
        </div>

        <small class="note">
          Setelah melakukan transfer, pembayaran perlu
          diverifikasi oleh admin sebelum paket aktif.
        </small>
      `
    }
  `;
}

async function checkStatus() {
  await loadPayment();
}

function escapeHtml(text) {
  const div =
    document.createElement("div");

  div.textContent = text;

  return div.innerHTML;
}
</script>

</body>
</html>
