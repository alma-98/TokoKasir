<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pembayaran | TokoKasir</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at top right,#dbeafe,transparent 30%),
    #f5f7fb;
  color:#152033;
}

.wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 18px;
}

.card{
  width:100%;
  max-width:680px;
  background:white;
  border:1px solid #e3e8ef;
  border-radius:26px;
  padding:34px;
  box-shadow:0 25px 80px rgba(24,45,80,.12);
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:16px;
  background:#0f62fe;
  color:white;
  display:grid;
  place-items:center;
  font-weight:900;
}

.brand-name{
  font-size:21px;
  font-weight:900;
}

.brand small{
  display:block;
  color:#64748b;
  margin-top:3px;
}

h1{
  margin:28px 0 8px;
  font-size:32px;
}

.subtitle{
  color:#64748b;
  line-height:1.7;
}

.invoice{
  margin:26px 0;
  padding:22px;
  background:#f8fafc;
  border:1px solid #e5eaf1;
  border-radius:18px;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:20px;
  padding:10px 0;
}

.total{
  border-top:1px solid #dde5ee;
  margin-top:8px;
  padding-top:18px;
  font-size:22px;
}

.bank{
  padding:22px;
  background:#eef5ff;
  border:1px solid #d6e6ff;
  border-radius:18px;
}

.bank-title{
  color:#64748b;
  font-size:13px;
  font-weight:700;
}

.bank-name{
  font-size:23px;
  font-weight:900;
  margin:8px 0 15px;
}

.account-number{
  font-size:25px;
  font-weight:900;
  letter-spacing:1px;
}

.status{
  margin:20px 0;
  padding:16px;
  border-radius:13px;
  font-weight:800;
  line-height:1.5;
}

.pending{
  background:#fff7df;
  color:#896300;
}

.approved{
  background:#e9fbf0;
  color:#157044;
}

.rejected{
  background:#fff0f0;
  color:#b42318;
}

.error{
  background:#fff0f0;
  color:#b42318;
}

.actions{
  display:grid;
  gap:10px;
}

.btn{
  width:100%;
  display:block;
  padding:15px;
  border:0;
  border-radius:12px;
  font:inherit;
  font-weight:900;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
}

.primary{
  background:#0f62fe;
  color:white;
}

.secondary{
  background:#edf2f7;
  color:#172033;
}

.note{
  margin-top:20px;
  color:#64748b;
  font-size:13px;
  line-height:1.7;
}

@media(max-width:600px){
  .card{padding:24px}
  h1{font-size:27px}
  .row{align-items:flex-start}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="card">

  <div class="brand">
    <div class="logo">TK</div>

    <div>
      <div class="brand-name">TokoKasir</div>
      <small>POS & Business Intelligence untuk UMKM</small>
    </div>
  </div>

  <h1>Selesaikan Pembayaran</h1>

  <p class="subtitle">
    Setelah pembayaran diverifikasi oleh admin,
    paket akan aktif selama 30 hari.
  </p>

  <div id="content">
    <div class="status pending">
      Memuat informasi pembayaran...
    </div>
  </div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config/supabase-config.js"></script>
<script src="../config/supabase-client.js"></script>

<script>
const db =
  window.tokoKasirSupabase;

const params =
  new URLSearchParams(
    location.search
  );

const paymentId =
  params.get("payment_id");

const content =
  document.getElementById(
    "content"
  );

if (!paymentId) {

  showError(
    "ID pembayaran tidak ditemukan."
  );

} else {

  loadPayment();

}

async function loadPayment(){

  try {

    const {
      data: {
        session
      },
      error: sessionError
    } =
      await db.auth.getSession();

    if (sessionError) {
      throw sessionError;
    }

    if (!session) {

      location.replace(
        "../account/"
      );

      return;
    }

    const {
      data: payment,
      error
    } =
      await db
        .from("payments")
        .select("*")
        .eq(
          "id",
          paymentId
        )
        .eq(
          "auth_user_id",
          session.user.id
        )
        .maybeSingle();

    if (error) {
      throw error;
    }

    if (!payment) {
      throw new Error(
        "Tagihan tidak ditemukan."
      );
    }

    renderPayment(
      payment
    );

  } catch (error) {

    console.error(error);

    showError(
      error.message ||
      "Gagal memuat pembayaran."
    );

  }
}

function renderPayment(payment) {

  const planLabel =
    payment.plan === "business"
      ? "Business"
      : "Pro";

  const amount =
    Number(payment.amount)
      .toLocaleString("id-ID");

  let statusHtml = "";
  let actionHtml = "";

  if (payment.status === "approved") {

    statusHtml = `
      <div class="status approved">
        ✓ Pembayaran telah diverifikasi.<br>
        Paket ${planLabel} sudah aktif.
      </div>
    `;

    actionHtml = `
      <a class="btn primary" href="../app/">
        Buka Aplikasi TokoKasir
      </a>

      <a class="btn secondary" href="../account/">
        Lihat Akun
      </a>
    `;

  } else if (payment.status === "rejected") {

    statusHtml = `
      <div class="status rejected">
        Pembayaran ditolak atau dibatalkan.
      </div>
    `;

    actionHtml = `
      <a class="btn primary" href="../account/">
        Pilih Paket Lagi
      </a>
    `;

  } else {

    statusHtml = `
      <div class="status pending">
        ⏳ Menunggu verifikasi pembayaran
      </div>
    `;

    actionHtml = `
      <button
        class="btn primary"
        onclick="loadPayment()"
      >
        Cek Status Pembayaran
      </button>

      <a
        class="btn secondary"
        href="../account/"
      >
        Kembali ke Akun
      </a>
    `;

  }

  content.innerHTML = `

    <div class="invoice">

      <div class="row">
        <span>ID Pembayaran</span>
        <strong>#${payment.id}</strong>
      </div>

      <div class="row">
        <span>Paket</span>
        <strong>${planLabel}</strong>
      </div>

      <div class="row total">
        <span>Total Pembayaran</span>
        <strong>Rp${amount}</strong>
      </div>

    </div>

    ${
      payment.status === "pending"
      ? `
        
<div class="bank qris-payment">
  <div class="bank-title">
    PEMBAYARAN QRIS
  </div>

  <p style="
    text-align:center;
    color:#64748b;
    line-height:1.6;
    margin:12px 0 18px;
  ">
    Scan QRIS untuk menyelesaikan pembayaran paket TokoKasir.
  </p>

  <div style="
    max-width:420px;
    margin:0 auto;
    padding:14px;
    background:#fff;
    border-radius:20px;
  ">
    <img
      src="qris-tokopeluang.png"
      alt="QRIS Pembayaran TokoKasir"
      style="
        display:block;
        width:100%;
        height:auto;
        border-radius:12px;
      "
    >
  </div>

  <div style="
    text-align:center;
    font-weight:800;
    margin-top:18px;
  ">
    Founder Investment Technology Indonesia
  </div>

  <div style="
    text-align:center;
    color:#64748b;
    font-size:14px;
    margin-top:8px;
  ">
    Bayar sesuai total pembayaran yang tertera di atas.
  </div>
</div>

      `
      : ""
    }

    ${statusHtml}

    <div class="actions">
      ${actionHtml}
    </div>

    <div class="note">
      Jangan melakukan pembayaran ke rekening selain
      rekening yang ditampilkan pada halaman resmi TokoKasir.
      Aktivasi paket dilakukan setelah pembayaran diverifikasi.
    </div>

  `;
}

function showError(message) {

  const div =
    document.createElement("div");

  div.textContent = message;

  content.innerHTML = `
    <div class="status error">
      ${div.innerHTML}
    </div>

    <a
      class="btn secondary"
      href="../account/"
    >
      Kembali ke Akun
    </a>
  `;
}

</script>


</body>
</html>
