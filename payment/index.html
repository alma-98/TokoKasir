<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pembayaran | TokoKasir</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at top right,#dbeafe,transparent 30%),
    #f5f7fb;
  color:#152033;
}

.wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 18px;
}

.card{
  width:100%;
  max-width:680px;
  background:white;
  border:1px solid #e3e8ef;
  border-radius:26px;
  padding:34px;
  box-shadow:0 25px 80px rgba(24,45,80,.12);
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:16px;
  background:#0f62fe;
  color:white;
  display:grid;
  place-items:center;
  font-weight:900;
}

.brand-name{
  font-size:21px;
  font-weight:900;
}

.brand small{
  display:block;
  color:#64748b;
  margin-top:3px;
}

h1{
  margin:28px 0 8px;
  font-size:32px;
}

.subtitle{
  color:#64748b;
  line-height:1.7;
}

.invoice{
  margin:26px 0;
  padding:22px;
  background:#f8fafc;
  border:1px solid #e5eaf1;
  border-radius:18px;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:20px;
  padding:10px 0;
}

.total{
  border-top:1px solid #dde5ee;
  margin-top:8px;
  padding-top:18px;
  font-size:22px;
}

.bank{
  padding:22px;
  background:#eef5ff;
  border:1px solid #d6e6ff;
  border-radius:18px;
}

.bank-title{
  color:#64748b;
  font-size:13px;
  font-weight:700;
}

.bank-name{
  font-size:23px;
  font-weight:900;
  margin:8px 0 15px;
}

.account-number{
  font-size:25px;
  font-weight:900;
  letter-spacing:1px;
}

.status{
  margin:20px 0;
  padding:16px;
  border-radius:13px;
  font-weight:800;
  line-height:1.5;
}

.pending{
  background:#fff7df;
  color:#896300;
}

.approved{
  background:#e9fbf0;
  color:#157044;
}

.rejected{
  background:#fff0f0;
  color:#b42318;
}

.error{
  background:#fff0f0;
  color:#b42318;
}

.actions{
  display:grid;
  gap:10px;
}

.btn{
  width:100%;
  display:block;
  padding:15px;
  border:0;
  border-radius:12px;
  font:inherit;
  font-weight:900;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
}

.primary{
  background:#0f62fe;
  color:white;
}

.secondary{
  background:#edf2f7;
  color:#172033;
}

.note{
  margin-top:20px;
  color:#64748b;
  font-size:13px;
  line-height:1.7;
}

@media(max-width:600px){
  .card{padding:24px}
  h1{font-size:27px}
  .row{align-items:flex-start}
}
</style>

<style id="TOKOKASIR_QRIS_PAYMENT_STYLE">

.qris-payment-box {
  margin: 24px 0;
  padding: 24px;
  text-align: center;
  background: #ffffff;
  border: 2px solid #e2e8f0;
  border-radius: 20px;
}

.qris-payment-title {
  margin: 0 0 8px;
  font-size: 22px;
  font-weight: 900;
  color: #0f172a;
}

.qris-payment-description {
  margin: 0 auto 20px;
  max-width: 500px;
  color: #64748b;
  line-height: 1.6;
}

.qris-image-wrapper {
  max-width: 380px;
  margin: 0 auto;
  padding: 14px;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 18px;
}

.qris-payment-image {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 10px;
}

.qris-amount {
  margin-top: 20px;
  padding: 16px;
  background: #f8fafc;
  border-radius: 14px;
}

.qris-amount-label {
  color: #64748b;
  font-size: 13px;
  margin-bottom: 5px;
}

.qris-amount-value {
  font-size: 28px;
  font-weight: 900;
  color: #0f172a;
}

.qris-instructions {
  margin-top: 20px;
  padding: 18px;
  text-align: left;
  background: #f8fafc;
  border-radius: 14px;
  color: #334155;
  line-height: 1.7;
}

.qris-instructions strong {
  display: block;
  margin-bottom: 8px;
  color: #0f172a;
}

.payment-warning {
  margin-top: 16px;
  padding: 14px;
  background: #fef3c7;
  color: #92400e;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
}

@media (max-width: 600px) {

  .qris-payment-box {
    padding: 16px;
  }

  .qris-image-wrapper {
    padding: 8px;
  }

  .qris-amount-value {
    font-size: 24px;
  }

}

</style>


<style id="TOKOKASIR_MAIN_WEBSITE_BUTTON">

.main-website-button {
  width: 100%;
  min-height: 52px;
  margin-top: 12px;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  padding: 14px 20px;

  background: #0f172a;
  color: #ffffff !important;

  border: 1px solid #0f172a;
  border-radius: 12px;

  font-size: 15px;
  font-weight: 800;

  text-decoration: none !important;

  cursor: pointer;

  transition:
    transform .15s ease,
    opacity .15s ease,
    box-shadow .15s ease;
}

.main-website-button:hover {
  opacity: .92;

  transform:
    translateY(-1px);

  box-shadow:
    0 10px 25px
    rgba(15, 23, 42, .15);
}

.main-website-button:active {
  transform:
    translateY(0);
}

.main-website-button .arrow {
  font-size: 18px;
}

</style>

</head>

<body>

<a
  id="paymentBackButton"
  href="https://alma-98.github.io/TokoKasir/account/"
  style="
    position:fixed;
    top:18px;
    left:18px;
    z-index:99999;
    display:inline-flex;
    align-items:center;
    padding:12px 18px;
    background:#ffffff;
    color:#0f172a;
    border:1px solid #e2e8f0;
    border-radius:12px;
    text-decoration:none;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(15,23,42,.12);
  "
>
  ← Kembali ke Akun
</a>



<div class="wrapper">
<div class="card">

  <div class="brand">
    <div class="logo">TK</div>

    <div>
      <div class="brand-name">TokoKasir</div>
      <small>POS & Business Intelligence untuk UMKM</small>
    </div>
  </div>

  <h1>Selesaikan Pembayaran</h1>

  <p class="subtitle">
    Setelah pembayaran diverifikasi oleh admin,
    paket akan aktif selama 30 hari.
  </p>

  <div id="content">
    <div class="status pending">
      Memuat informasi pembayaran...
    </div>
  </div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</script>
<script src="../config/supabase-config.js"></script>
<script src="../config/supabase-client.js"></script>

<script>
const db =
  window.tokoKasirSupabase;

const params =
  new URLSearchParams(
    location.search
  );

const paymentId =
  params.get("payment_id");

const content =
  document.getElementById(
    "content"
  );

if (!paymentId) {

  showError(
    "ID pembayaran tidak ditemukan."
  );

} else {



}




;


window.loadPayment = async function loadPayment() {

  try {

    content.innerHTML = `
      <div style="
        padding:30px;
        text-align:center;
      ">
        Memuat informasi pembayaran...
      </div>
    `;

    // Ambil user Supabase yang sedang login
    const {
      data: {
        user
      },
      error: userError
    } =
      await db.auth.getUser();

    if (userError) {
      throw userError;
    }

    if (!user) {

      window.location.href =
        "/TokoKasir/account/";

      return;
    }

    if (!paymentId) {

      throw new Error(
        "ID pembayaran tidak ditemukan."
      );

    }

    console.log(
      "LOAD PAYMENT:",
      {
        payment_id: paymentId,
        auth_user_id: user.id
      }
    );

    // Payment ID adalah bigint.
    // User Auth adalah UUID.
    // Jangan bandingkan UUID dengan kolom id bigint.
    const {
      data: payment,
      error: paymentError
    } =
      await db
        .from("payments")
        .select("*")
        .eq(
          "id",
          Number(paymentId)
        )
        .eq(
          "auth_user_id",
          user.id
        )
        .maybeSingle();

    if (paymentError) {

      console.error(
        "PAYMENT LOAD ERROR:",
        paymentError
      );

      throw paymentError;
    }

    if (!payment) {

      throw new Error(
        "Tagihan tidak ditemukan atau bukan milik akun ini."
      );

    }

    renderPayment(
      payment
    );

  } catch (error) {

    console.error(
      "LOAD PAYMENT ERROR:",
      error
    );

    showError(
      error.message ||
      "Gagal memuat informasi pembayaran."
    );

  }

}


function renderPayment(payment) {

  const planLabel =
    payment.plan === "business"
      ? "Business"
      : "Pro";

  const amount =
    Number(payment.amount)
      .toLocaleString("id-ID");

  let statusHtml = "";
  let actionHtml = "";

  if (payment.status === "approved") {

    statusHtml = `
      <div class="status approved">
        ✓ Pembayaran telah diverifikasi.<br>
        Paket ${planLabel} sudah aktif.
      </div>
    `;

    actionHtml = `
      

      <a class="btn secondary" href="/TokoKasir/account/">
        Lihat Akun
      </a>
    `;

  } else if (payment.status === "rejected") {

    statusHtml = `
      <div class="status rejected">
        Pembayaran ditolak atau dibatalkan.
      </div>
    `;

    actionHtml = `
      <a class="btn primary" href="/TokoKasir/account/">
        Pilih Paket Lagi
      </a>
    `;

  } else {

    statusHtml = `
      <div class="status pending">
        ⏳ Menunggu verifikasi pembayaran
      </div>
    `;

    actionHtml = `
      <button
        id="checkStatusButton"
        class="btn primary"
        type="button"
        onclick="window.loadPayment()"
      >
        Cek Status Pembayaran
      </button>

      <a
        class="btn secondary"
        href="/TokoKasir/account/"
      >
        Kembali ke Akun
      </a>
    `;

  }

  content.innerHTML = `

    <div class="invoice">

      <div class="row">
        <span>ID Pembayaran</span>
        <strong>#${payment.id}</strong>
      </div>

      <div class="row">
        <span>Paket</span>
        <strong>${planLabel}</strong>
      </div>

      <div class="row total">
        <span>Total Pembayaran</span>
        <strong>Rp${amount}</strong>
      </div>

    </div>

    ${
      payment.status === "pending"
      ? `
        
<div class="bank qris-payment">
  <div class="bank-title">
    PEMBAYARAN QRIS
  </div>

  <p style="
    text-align:center;
    color:#64748b;
    line-height:1.6;
    margin:12px 0 18px;
  ">
    Scan QRIS untuk menyelesaikan pembayaran paket TokoKasir.
  </p>

  <div style="
    max-width:420px;
    margin:0 auto;
    padding:14px;
    background:#fff;
    border-radius:20px;
  ">
    <img
      src="/TokoKasir/qris.png"
      alt="QRIS Pembayaran TokoKasir"
      style="
        display:block;
        width:100%;
        height:auto;
        border-radius:12px;
      "
    >
  </div>

  <div style="
    text-align:center;
    font-weight:800;
    margin-top:18px;
  ">
    Founder Investment Technology Indonesia
  </div>

  <div style="
    text-align:center;
    color:#64748b;
    font-size:14px;
    margin-top:8px;
  ">
    Bayar sesuai total pembayaran yang tertera di atas.
  </div>
</div>

      `
      : ""
    }

    ${statusHtml}

    <div class="actions">
      ${actionHtml}
    </div>

    <div class="note">
      Jangan melakukan pembayaran ke rekening selain
      rekening yang ditampilkan pada halaman resmi TokoKasir.
      Aktivasi paket dilakukan setelah pembayaran diverifikasi.
    </div>

  `;
}

function showError(message) {

  const div =
    document.createElement("div");

  div.textContent = message;

  content.innerHTML = `

    <div class="invoice">

      <div class="row">
        <span>ID Pembayaran</span>
        <strong>#${payment.id}</strong>
      </div>

      <div class="row">
        <span>Paket</span>
        <strong>${planLabel}</strong>
      </div>

      <div class="row">
        <span>Total Pembayaran</span>
        <strong>Rp${amount}</strong>
      </div>

    </div>


    ${
      payment.status === "pending"
        ? `

        <div class="qris-payment-box">

          <h2 class="qris-payment-title">
            Bayar dengan QRIS
          </h2>

          <p class="qris-payment-description">
            Scan QRIS di bawah menggunakan aplikasi
            mobile banking atau e-wallet Anda.
          </p>

          <div class="qris-image-wrapper">

            <img
              src="/TokoKasir/qris.png"
              alt="QRIS Pembayaran TokoKasir"
              class="qris-payment-image"
            >

          </div>

          <div class="qris-amount">

            <div class="qris-amount-label">
              Total yang harus dibayar
            </div>

            <div class="qris-amount-value">
              Rp${amount}
            </div>

          </div>

          <div class="qris-instructions">

            <strong>
              Cara Pembayaran:
            </strong>

            1. Buka aplikasi mobile banking atau e-wallet.<br>
            2. Pilih menu Scan QRIS.<br>
            3. Scan QRIS di atas.<br>
            4. Masukkan nominal pembayaran sebesar
            <strong style="display:inline">
              Rp${amount}
            </strong>.<br>
            5. Selesaikan pembayaran.<br>
            6. Klik tombol
            <strong style="display:inline">
              Cek Status Pembayaran
            </strong>
            setelah pembayaran diverifikasi.

          </div>

          <div class="payment-warning">
            Pastikan nominal pembayaran sesuai dengan
            total tagihan agar pembayaran dapat diverifikasi.
          </div>

        </div>

        `
        : ""
    }


    ${statusHtml}


    <div class="actions">

      ${actionHtml}

      <a
        class="btn secondary"
        href="/TokoKasir/account/"
      >
        ← Kembali ke Akun
      </a>

      <a
        class="main-website-button"
        href="/TokoKasir/"
      >
        <span class="arrow">←</span>
        <span>Kembali ke Website TokoKasir</span>
      </a>

    </div>

  `;
}


// ==================================================
// TOKOKASIR PAYMENT STARTUP
// Jalankan setelah seluruh function selesai dibuat.
// ==================================================
(async function startTokoKasirPayment() {
  try {
    if (typeof window.loadPayment !== "function") {
      throw new Error(
        "Fungsi loadPayment belum tersedia."
      );
    }

    await window.loadPayment();

  } catch (error) {
    console.error(
      "PAYMENT STARTUP ERROR:",
      error
    );

    const target =
      document.getElementById("content");

    if (target) {
      target.innerHTML = `
        <div style="
          padding:24px;
          background:#fee2e2;
          color:#991b1b;
          border-radius:14px;
          line-height:1.6;
        ">
          <strong>Gagal memuat pembayaran.</strong><br>
          ${String(
            error.message ||
            "Terjadi kesalahan."
          )}
          <br><br>
          <a href="/TokoKasir/account/">
            ← Kembali ke Akun
          </a>
        </div>
      `;
    }
  }
})();

</script>



<div style="width:min(680px,calc(100% - 32px));margin:0 auto 48px;">
  <a
    class="btn secondary"
    href="/TokoKasir/"
    style="display:block;text-align:center;text-decoration:none;"
  >
    ← Kembali ke Website TokoKasir
  </a>
</div>

</body>
