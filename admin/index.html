<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>
<title>Admin Pembayaran — TokoKasir</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family:
    Inter,
    Arial,
    sans-serif;
  background: #f8fafc;
  color: #0f172a;
}

header {
  background: #0f172a;
  color: white;
  padding: 20px;
}

.header-inner {
  max-width: 1100px;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  font-size: 22px;
  font-weight: 800;
}

.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 20px;
}

.card {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 18px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow:
    0 10px 30px
    rgba(15, 23, 42, .06);
}

h1,
h2,
p {
  margin-top: 0;
}

.form-group {
  margin-bottom: 16px;
}

label {
  display: block;
  font-weight: 700;
  margin-bottom: 7px;
}

input {
  width: 100%;
  padding: 13px 14px;
  border:
    1px solid #cbd5e1;
  border-radius: 10px;
  font-size: 15px;
}

button,
.btn {
  border: 0;
  border-radius: 10px;
  padding: 12px 16px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}

.primary {
  background: #0f172a;
  color: white;
}

.approve {
  background: #16a34a;
  color: white;
}

.reject {
  background: #dc2626;
  color: white;
}

.secondary {
  background: #e2e8f0;
  color: #0f172a;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.hidden {
  display: none !important;
}

.message {
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 18px;
  display: none;
}

.message.show {
  display: block;
}

.message.success {
  background: #dcfce7;
  color: #166534;
}

.message.error {
  background: #fee2e2;
  color: #991b1b;
}

.payment {
  border:
    1px solid #e2e8f0;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 14px;
}

.payment-grid {
  display: grid;
  grid-template-columns:
    repeat(
      auto-fit,
      minmax(160px, 1fr)
    );
  gap: 16px;
  margin-bottom: 16px;
}

.label {
  color: #64748b;
  font-size: 13px;
  margin-bottom: 4px;
}

.value {
  font-weight: 800;
  word-break: break-word;
}

.status {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 12px;
}

.status.pending {
  background: #fef3c7;
  color: #92400e;
}

.status.approved {
  background: #dcfce7;
  color: #166534;
}

.status.rejected {
  background: #fee2e2;
  color: #991b1b;
}

@media (max-width: 640px) {
  .header-inner {
    align-items: flex-start;
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">
      TK · Admin TokoKasir
    </div>

    <a
      href="/TokoKasir/"
      class="btn secondary"
    >
      ← Website
    </a>
  </div>
</header>

<main class="container">

  <div
    id="message"
    class="message"
  ></div>

  <section
    id="loginCard"
    class="card"
  >
    <h1>Login Admin</h1>

    <p>
      Gunakan akun admin TokoKasir.
    </p>

    <form id="loginForm">

      <div class="form-group">
        <label>Email</label>

        <input
          id="email"
          type="email"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label>Password</label>

        <input
          id="password"
          type="password"
          required
          autocomplete="current-password"
        >
      </div>

      <button
        type="submit"
        class="primary"
      >
        Masuk Admin
      </button>

    </form>
  </section>

  <section
    id="adminPanel"
    class="hidden"
  >

    <div class="card">

      <h1>
        Verifikasi Pembayaran
      </h1>

      <p id="adminEmail"></p>

      <div class="actions">

        <button
          class="primary"
          onclick="loadPayments()"
        >
          Refresh Pembayaran
        </button>

        <button
          class="secondary"
          onclick="logout()"
        >
          Keluar
        </button>

      </div>

    </div>

    <div class="card">

      <h2>
        Daftar Pembayaran
      </h2>

      <div id="payments">
        Memuat pembayaran...
      </div>

    </div>

  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="/TokoKasir/config/supabase-config.js"></script>

<script src="/TokoKasir/config/supabase-client.js"></script>

<script>
const db =
  window.tokoKasirSupabase;

const ADMIN_EMAIL =
  "alma.budsteddy88@gmail.com";

function showMessage(
  text,
  type = "success"
) {

  const el =
    document.getElementById(
      "message"
    );

  el.textContent = text;

  el.className =
    "message show " + type;
}

function hideMessage() {

  document
    .getElementById("message")
    .className =
      "message";
}

async function checkAdmin() {

  const {
    data: {
      session
    }
  } =
    await db.auth.getSession();

  if (!session) {

    document
      .getElementById(
        "loginCard"
      )
      .classList
      .remove("hidden");

    document
      .getElementById(
        "adminPanel"
      )
      .classList
      .add("hidden");

    return;
  }

  const email =
    session.user.email || "";

  if (
    email.toLowerCase() !==
    ADMIN_EMAIL.toLowerCase()
  ) {

    await db.auth.signOut();

    showMessage(
      "Akun ini bukan admin TokoKasir.",
      "error"
    );

    return;
  }

  document
    .getElementById(
      "loginCard"
    )
    .classList
    .add("hidden");

  document
    .getElementById(
      "adminPanel"
    )
    .classList
    .remove("hidden");

  document
    .getElementById(
      "adminEmail"
    )
    .textContent =
      "Admin: " + email;

  await loadPayments();
}

document
  .getElementById(
    "loginForm"
  )
  .addEventListener(
    "submit",
    async event => {

      event.preventDefault();

      hideMessage();

      const email =
        document
          .getElementById(
            "email"
          )
          .value
          .trim();

      const password =
        document
          .getElementById(
            "password"
          )
          .value;

      try {

        const {
          error
        } =
          await db.auth
            .signInWithPassword({
              email,
              password
            });

        if (error) {
          throw error;
        }

        await checkAdmin();

      } catch (error) {

        showMessage(
          error.message ||
          "Login gagal.",
          "error"
        );

      }
    }
  );

async function loadPayments() {

  const container =
    document.getElementById(
      "payments"
    );

  container.innerHTML =
    "Memuat pembayaran...";

  try {

    const {
      data,
      error
    } =
      await db
        .from("payments")
        .select("*")
        .order(
          "created_at",
          {
            ascending: false
          }
        );

    if (error) {
      throw error;
    }

    if (
      !data ||
      data.length === 0
    ) {

      container.innerHTML =
        "<p>Belum ada pembayaran.</p>";

      return;
    }

    container.innerHTML =
      data
        .map(
          payment =>
            renderPayment(payment)
        )
        .join("");

  } catch (error) {

    container.innerHTML =
      "<p>Gagal memuat pembayaran.</p>";

    showMessage(
      error.message,
      "error"
    );

  }
}

function renderPayment(payment) {

  const amount =
    Number(
      payment.amount || 0
    )
      .toLocaleString(
        "id-ID"
      );

  const plan =
    String(
      payment.plan || "-"
    )
      .toUpperCase();

  const status =
    String(
      payment.status ||
      "pending"
    )
      .toLowerCase();

  const createdAt =
    payment.created_at
      ? new Date(
          payment.created_at
        )
          .toLocaleString(
            "id-ID"
          )
      : "-";

  let buttons = "";

  if (status === "pending") {

    buttons = `
      <div class="actions">

        <button
          class="approve"
          onclick="approvePayment(${Number(payment.id)})"
        >
          ✓ Setujui
        </button>

        <button
          class="reject"
          onclick="rejectPayment(${Number(payment.id)})"
        >
          ✕ Tolak
        </button>

      </div>
    `;
  }

  return `
    <div class="payment">

      <div class="payment-grid">

        <div>
          <div class="label">
            ID Pembayaran
          </div>

          <div class="value">
            #${payment.id}
          </div>
        </div>

        <div>
          <div class="label">
            Paket
          </div>

          <div class="value">
            ${plan}
          </div>
        </div>

        <div>
          <div class="label">
            Total
          </div>

          <div class="value">
            Rp${amount}
          </div>
        </div>

        <div>
          <div class="label">
            Status
          </div>

          <div>
            <span
              class="status ${status}"
            >
              ${status.toUpperCase()}
            </span>
          </div>
        </div>

        <div>
          <div class="label">
            Dibuat
          </div>

          <div class="value">
            ${createdAt}
          </div>
        </div>

      </div>

      ${buttons}

    </div>
  `;
}

async function approvePayment(
  paymentId
) {

  if (
    !confirm(
      "Setujui pembayaran #" +
      paymentId +
      "?"
    )
  ) {
    return;
  }

  try {

    const {
      data,
      error
    } =
      await db.rpc(
        "approve_tokokasir_payment",
        {
          p_payment_id:
            paymentId
        }
      );

    if (error) {
      throw error;
    }

    showMessage(
      data?.message ||
      "Pembayaran berhasil disetujui."
    );

    await loadPayments();

  } catch (error) {

    showMessage(
      error.message,
      "error"
    );

  }
}

async function rejectPayment(
  paymentId
) {

  if (
    !confirm(
      "Tolak pembayaran #" +
      paymentId +
      "?"
    )
  ) {
    return;
  }

  try {

    const {
      data,
      error
    } =
      await db.rpc(
        "reject_tokokasir_payment",
        {
          p_payment_id:
            paymentId
        }
      );

    if (error) {
      throw error;
    }

    showMessage(
      data?.message ||
      "Pembayaran ditolak."
    );

    await loadPayments();

  } catch (error) {

    showMessage(
      error.message,
      "error"
    );

  }
}

async function logout() {

  await db.auth.signOut();

  location.reload();
}

checkAdmin();
</script>

</body>
</html>
